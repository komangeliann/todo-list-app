<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png">
</head>
<body>

<!-- APP CONTAINER -->
<div class="container">
    <h1>To Do List</h1>

    <!-- Input Section -->
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add new task...">
        <input type="date" id="dueDate">

        <div class="custom-dropdown" id="priorityDropdown">
            <div class="dropdown-selected">
                Low
                <i class="fa fa-chevron-down"></i>
            </div>

            <div class="dropdown-options">
                <div data-value="High">High</div>
                <div data-value="Medium">Medium</div>
                <div data-value="Low">Low</span></div>
            </div>
        </div>

        <button onclick="addTask()">Add</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button onclick="filterTasks('all')" id="btnAll">All</button>
        <button onclick="filterTasks('active')" id="btnActive">Active</button>
        <button onclick="filterTasks('completed')" id="btnCompleted">Completed</button>
        <button onclick="toggleDarkMode()">Dark Mode</button>
    </div>

    <!-- SEARCH & SORT -->
    <div class="tools">
        <input type="text" id="searchInput" placeholder="Search task..." oninput="showTasks()">

        <div class="custom-dropdown" id="sortDropdown">
            <div class="dropdown-selected">
                Sort By
                <i class="fa fa-chevron-down"></i>
            </div>

            <div class="dropdown-options">
                <div data-value="default">Default</div>
                <div data-value="date">Due Date</div>
                <div data-value="priority">Priority</div>
            </div>
        </div>

        <button onclick="exportTasks()">Export</button>
        
        <button onclick="document.getElementById('importFile').click()">Import</button>
        <input type="file" id="importFile" accept=".json" onchange="importTasks(event)" hidden>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <!-- Task Info -->
    <div id="taskCount"></div>

    <!-- Task List -->
    <ul id="taskList"></ul>
</div>


<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Edit Task</h2>

        <input type="text" id="editTaskInput">
        <input type="date" id="editDueDate">

        <div class="custom-dropdown" id="editPriorityDropdown">
            <div class="dropdown-selected">
                Low
                <i class="fa fa-chevron-down"></i>
            </div>

            <div class="dropdown-options">
                <div data-value="Low">Low</div>
                <div data-value="Medium">Medium</div>
                <div data-value="High">High</div>
            </div>
        </div>

        <div class="modal-buttons">
            <button onclick="saveEdit()" id="btnSave">Save</button>
            <button onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- IMPORT MODAL -->
<div id="importModal" class="modal">
    <div class="modal-content">
        <h2>Import Tasks</h2>
        <p>Do you want to replace existing tasks or merge them?</p>

        <div class="modal-buttons">
            <button onclick="confirmImport('replace')" id="btnReplace">Replace</button>
            <button onclick="confirmImport('merge')" id="btnMerge">Merge</button>
            <button onclick="closeImportModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="toastContainer"></div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
