<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- APP CONTAINER -->
<div class="container">
    <h1>To Do List</h1>

    <!-- Input Section -->
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add new task...">
        <input type="date" id="dueDate">

        <select id="priority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <button onclick="addTask()">Add</button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('active')">Active</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="toggleDarkMode()">Dark Mode</button>
    </div>

    <!-- SEARCH & SORT -->
    <div class="tools">
        <input type="text" id="searchInput" placeholder="Search task..." oninput="showTasks()">

        <select id="sortOption" onchange="showTasks()">
            <option value="default">Sort By</option>
            <option value="date">Due Date</option>
            <option value="priority">Priority</option>
        </select>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <!-- Task Info -->
    <div id="taskCount"></div>

    <!-- Task List -->
    <ul id="taskList"></ul>
</div>


<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Edit Task</h2>

        <input type="text" id="editTaskInput">
        <input type="date" id="editDueDate">

        <select id="editPriority">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <div class="modal-buttons">
            <button onclick="saveEdit()" id="btnSave">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
